name: CI

on:
  push:
    branches: [main]
    paths: &ci_paths
      - ".github/workflows/ci.yml"
      - ".github/scripts/**"
      - ".gitignore"
      - "README.md"
      - "CITATION.cff"
      - "SECURITY.md"
      - "references/**"
      - "scripts/**"
      - "skills/**"
  pull_request:
    branches: [main]
    paths: *ci_paths
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUFF_VERSION: "0.12.4"

jobs:
  validate:
    name: Validate skill source
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install "ruff==$RUFF_VERSION"

      - name: Check cross-agent portability
        run: python3 .github/scripts/check-portability.py

      - name: Check version consistency
        run: python3 scripts/check-version-consistency.py

      - name: Check README tree matches tracked files
        run: python3 scripts/check-readme-tree.py

      - name: Validate CI policy
        run: python3 scripts/validate-ci.py

      - name: Run skill source checks
        run: python3 scripts/validate.py

      - name: Test CI policy validation
        run: python3 scripts/test-validate-ci.py

      - name: Test payload sync behavior
        run: python3 scripts/test-sync-payload.py

      - name: Payload sync check
        run: bash scripts/sync-payload.sh --ci

      - name: Ruff check scripts
        run: python3 -m ruff check scripts .github/scripts

  verify-urls:
    name: Verify external references
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verify referenced URLs
        run: python3 scripts/verify-urls.py
